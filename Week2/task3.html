<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form</title>
</head>
<body>

    <form id="contactForm" name="Contact Us">
        <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        </div>

        <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        </div>
        
        <div>
        <label for="subject">Subject:</label>
        <select id="subject" name="subject">
        <option value="general">General Inquiry</option>
        <option value="support">Support</option>
        <option value="feedback">Feedback</option>
        </select><br><br>
        </div>

         <div>   
        <label for="message">Message:</label><br>
        <textarea id="message" rows="3" cols="40" required></textarea><br><br>
        </div>
        
        <input type="submit" value="Submit">
    </form>
    
</body>


<script>
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', function(event) {
        event.preventDefault(); //stopping the submission of the form

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const subject = document.getElementById('subject').value;
        const message = document.getElementById('message').value;

        alert("Form details:\n\nName: "+name+"\nEmail: "+email+"\nSubject: "+subject+"\nMessage: "+message);
        alert("Form submitted successfully! (demo only, no actual submission)");
        form.reset(); // Reset the form after submission
    });
</script>
</html>
